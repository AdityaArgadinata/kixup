<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Contract document -->
  <rect x="250" y="60" width="300" height="200" rx="8" fill="#ffffff" opacity="0.95"/>
  <!-- Document lines -->
  <line x1="280" y1="100" x2="520" y2="100" stroke="#cccccc" stroke-width="2"/>
  <line x1="280" y1="125" x2="520" y2="125" stroke="#cccccc" stroke-width="2"/>
  <line x1="280" y1="150" x2="450" y2="150" stroke="#cccccc" stroke-width="2"/>
  <line x1="280" y1="175" x2="480" y2="175" stroke="#cccccc" stroke-width="2"/>
  <line x1="280" y1="200" x2="400" y2="200" stroke="#cccccc" stroke-width="2"/>
  <!-- Signature -->
  <path d="M350 230 Q370 220 390 235 Q410 245 430 230" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Price tag / Euro symbol -->
  <circle cx="560" cy="160" r="40" fill="#e94560"/>
  <text x="560" y="175" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">€</text>
  <!-- Arrow pointing from contract to price -->
  <line x1="520" y1="160" x2="520" y2="160" stroke="#e94560" stroke-width="3"/>
  <!-- Chain link (clause = binding) -->
  <ellipse cx="320" cy="330" rx="25" ry="15" fill="none" stroke="#4895ef" stroke-width="4"/>
  <ellipse cx="370" cy="330" rx="25" ry="15" fill="none" stroke="#4895ef" stroke-width="4"/>
  <ellipse cx="420" cy="330" rx="25" ry="15" fill="none" stroke="#4895ef" stroke-width="4"/>
  <!-- Corner accents -->
  <line x1="30" y1="30" x2="80" y2="30" stroke="#4895ef" stroke-width="3"/>
  <line x1="30" y1="30" x2="30" y2="80" stroke="#4895ef" stroke-width="3"/>
  <line x1="770" y1="30" x2="720" y2="30" stroke="#4895ef" stroke-width="3"/>
  <line x1="770" y1="30" x2="770" y2="80" stroke="#4895ef" stroke-width="3"/>
  <!-- Title -->
  <text x="400" y="400" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">What is a Release Clause in Football?</text>
</svg>