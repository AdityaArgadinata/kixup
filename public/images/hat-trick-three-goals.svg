<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <radialGradient id="ball" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Goal net pattern -->
  <rect x="180" y="80" width="440" height="250" rx="4" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <!-- Net lines vertical -->
  <line x1="220" y1="80" x2="220" y2="330" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <line x1="260" y1="80" x2="260" y2="330" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <line x1="300" y1="80" x2="300" y2="330" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <line x1="340" y1="80" x2="340" y2="330" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <line x1="380" y1="80" x2="380" y2="330" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <line x1="420" y1="80" x2="420" y2="330" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <line x1="460" y1="80" x2="460" y2="330" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <line x1="500" y1="80" x2="500" y2="330" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <line x1="540" y1="80" x2="540" y2="330" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <line x1="580" y1="80" x2="580" y2="330" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <!-- Net lines horizontal -->
  <line x1="180" y1="120" x2="620" y2="120" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <line x1="180" y1="160" x2="620" y2="160" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <line x1="180" y1="200" x2="620" y2="200" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <line x1="180" y1="240" x2="620" y2="240" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <line x1="180" y1="280" x2="620" y2="280" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <!-- Goal posts -->
  <rect x="175" y="70" width="450" height="12" rx="4" fill="#ffffff"/>
  <rect x="175" y="70" width="12" height="270" rx="4" fill="#ffffff"/>
  <rect x="613" y="70" width="12" height="270" rx="4" fill="#ffffff"/>
  <!-- Ball 1 (top left) -->
  <circle cx="300" cy="150" r="20" fill="url(#ball)"/>
  <path d="M290 140 L300 135 L310 140 L310 155 L300 160 L290 155Z" fill="#333" opacity="0.3"/>
  <!-- Ball 2 (top right) -->
  <circle cx="440" cy="170" r="20" fill="url(#ball)"/>
  <path d="M430 160 L440 155 L450 160 L450 175 L440 180 L430 175Z" fill="#333" opacity="0.3"/>
  <!-- Ball 3 (bottom center) -->
  <circle cx="370" cy="260" r="20" fill="url(#ball)"/>
  <path d="M360 250 L370 245 L380 250 L380 265 L370 270 L360 265Z" fill="#333" opacity="0.3"/>
  <!-- "3" number -->
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#e94560" text-anchor="middle">3</text>
  <!-- Corner accents -->
  <line x1="30" y1="30" x2="80" y2="30" stroke="#e94560" stroke-width="3"/>
  <line x1="30" y1="30" x2="30" y2="80" stroke="#e94560" stroke-width="3"/>
  <line x1="770" y1="30" x2="720" y2="30" stroke="#e94560" stroke-width="3"/>
  <line x1="770" y1="30" x2="770" y2="80" stroke="#e94560" stroke-width="3"/>
  <!-- Title -->
  <text x="400" y="430" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">What is a Hat-Trick in Football?</text>
</svg>