<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Monitor frame -->
  <rect x="200" y="60" width="400" height="260" rx="12" fill="#2a2a4a" stroke="#e94560" stroke-width="3"/>
  <!-- Screen -->
  <rect x="215" y="75" width="370" height="230" rx="6" fill="url(#screen)"/>
  <!-- Play button circle on screen -->
  <circle cx="400" cy="190" r="45" fill="none" stroke="#e94560" stroke-width="3"/>
  <polygon points="388,168 388,212 420,190" fill="#e94560"/>
  <!-- VAR text on screen -->
  <text x="400" y="145" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">VAR</text>
  <text x="400" y="255" font-family="Arial, sans-serif" font-size="14" fill="#a0a0c0" text-anchor="middle">Video Assistant Referee</text>
  <!-- Monitor stand -->
  <rect x="370" y="320" width="60" height="30" fill="#2a2a4a"/>
  <rect x="340" y="345" width="120" height="10" rx="5" fill="#2a2a4a"/>
  <!-- Signal waves -->
  <path d="M480 100 Q510 130 480 160" fill="none" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <path d="M500 85 Q540 130 500 175" fill="none" stroke="#e94560" stroke-width="2" opacity="0.4"/>
  <!-- Corner accents -->
  <line x1="30" y1="30" x2="80" y2="30" stroke="#e94560" stroke-width="3"/>
  <line x1="30" y1="30" x2="30" y2="80" stroke="#e94560" stroke-width="3"/>
  <line x1="770" y1="30" x2="720" y2="30" stroke="#e94560" stroke-width="3"/>
  <line x1="770" y1="30" x2="770" y2="80" stroke="#e94560" stroke-width="3"/>
  <!-- Title -->
  <text x="400" y="420" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">What is VAR in Football?</text>
</svg>