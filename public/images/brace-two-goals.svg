<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <radialGradient id="ball" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Goal net -->
  <rect x="220" y="80" width="360" height="230" rx="4" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <!-- Net lines -->
  <line x1="260" y1="80" x2="260" y2="310" stroke="#ffffff" stroke-width="1" opacity="0.12"/>
  <line x1="300" y1="80" x2="300" y2="310" stroke="#ffffff" stroke-width="1" opacity="0.12"/>
  <line x1="340" y1="80" x2="340" y2="310" stroke="#ffffff" stroke-width="1" opacity="0.12"/>
  <line x1="380" y1="80" x2="380" y2="310" stroke="#ffffff" stroke-width="1" opacity="0.12"/>
  <line x1="420" y1="80" x2="420" y2="310" stroke="#ffffff" stroke-width="1" opacity="0.12"/>
  <line x1="460" y1="80" x2="460" y2="310" stroke="#ffffff" stroke-width="1" opacity="0.12"/>
  <line x1="500" y1="80" x2="500" y2="310" stroke="#ffffff" stroke-width="1" opacity="0.12"/>
  <line x1="540" y1="80" x2="540" y2="310" stroke="#ffffff" stroke-width="1" opacity="0.12"/>
  <line x1="220" y1="130" x2="580" y2="130" stroke="#ffffff" stroke-width="1" opacity="0.12"/>
  <line x1="220" y1="180" x2="580" y2="180" stroke="#ffffff" stroke-width="1" opacity="0.12"/>
  <line x1="220" y1="230" x2="580" y2="230" stroke="#ffffff" stroke-width="1" opacity="0.12"/>
  <line x1="220" y1="280" x2="580" y2="280" stroke="#ffffff" stroke-width="1" opacity="0.12"/>
  <!-- Goal posts -->
  <rect x="215" y="70" width="370" height="12" rx="4" fill="#ffffff"/>
  <rect x="215" y="70" width="12" height="250" rx="4" fill="#ffffff"/>
  <rect x="573" y="70" width="12" height="250" rx="4" fill="#ffffff"/>
  <!-- Ball 1 -->
  <circle cx="340" cy="180" r="22" fill="url(#ball)"/>
  <path d="M330 170 L340 165 L350 170 L350 185 L340 190 L330 185Z" fill="#333" opacity="0.3"/>
  <!-- Ball 2 -->
  <circle cx="460" cy="200" r="22" fill="url(#ball)"/>
  <path d="M450 190 L460 185 L470 190 L470 205 L460 210 L450 205Z" fill="#333" opacity="0.3"/>
  <!-- "2" number -->
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#4895ef" text-anchor="middle">2</text>
  <!-- Label -->
  <text x="400" y="410" font-family="Arial, sans-serif" font-size="14" fill="#a0a0c0" text-anchor="middle">Two goals by the same player</text>
  <!-- Corner accents -->
  <line x1="30" y1="30" x2="80" y2="30" stroke="#4895ef" stroke-width="3"/>
  <line x1="30" y1="30" x2="30" y2="80" stroke="#4895ef" stroke-width="3"/>
  <line x1="770" y1="30" x2="720" y2="30" stroke="#4895ef" stroke-width="3"/>
  <line x1="770" y1="30" x2="770" y2="80" stroke="#4895ef" stroke-width="3"/>
  <!-- Title -->
  <text x="400" y="440" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">What is a Brace in Football?</text>
</svg>