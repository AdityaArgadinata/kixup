<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">MLS and Premier League comparison</title>
  <desc id="desc">Split-screen graphic comparing American and English soccer leagues.</desc>
  <rect width="600" height="675" fill="#0f766e"/>
  <rect x="600" width="600" height="675" fill="#1e293b"/>
  <circle cx="300" cy="337" r="155" fill="none" stroke="#ccfbf1" stroke-width="12"/>
  <circle cx="900" cy="337" r="155" fill="none" stroke="#e2e8f0" stroke-width="12"/>
  <text x="210" y="350" fill="#ffffff" font-family="Arial, sans-serif" font-size="72" font-weight="900">MLS</text>
  <text x="735" y="350" fill="#ffffff" font-family="Arial, sans-serif" font-size="64" font-weight="900">Premier</text>
  <text x="760" y="420" fill="#ffffff" font-family="Arial, sans-serif" font-size="46" font-weight="800">League</text>
</svg>
