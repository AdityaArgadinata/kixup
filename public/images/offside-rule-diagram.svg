<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b2838"/>
    </linearGradient>
    <linearGradient id="pitch" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6a4f"/>
      <stop offset="100%" style="stop-color:#1b4332"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Pitch section -->
  <rect x="100" y="80" width="600" height="280" rx="8" fill="url(#pitch)" opacity="0.8"/>
  <!-- Pitch lines -->
  <rect x="100" y="80" width="600" height="280" rx="8" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="80" x2="400" y2="360" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <!-- Offside line (dramatic) -->
  <line x1="520" y1="80" x2="520" y2="360" stroke="#e94560" stroke-width="3" stroke-dasharray="10,6"/>
  <!-- Attacker (ahead of line) -->
  <circle cx="560" cy="200" r="14" fill="#e94560"/>
  <line x1="560" y1="214" x2="560" y2="250" stroke="#e94560" stroke-width="3"/>
  <line x1="560" y1="230" x2="545" y2="220" stroke="#e94560" stroke-width="3"/>
  <line x1="560" y1="230" x2="575" y2="220" stroke="#e94560" stroke-width="3"/>
  <!-- Defender (on line) -->
  <circle cx="520" cy="220" r="14" fill="#4895ef"/>
  <line x1="520" y1="234" x2="520" y2="270" stroke="#4895ef" stroke-width="3"/>
  <!-- Ball -->
  <circle cx="500" cy="190" r="8" fill="#ffffff"/>
  <!-- Flag icon -->
  <rect x="140" y="120" width="4" height="60" fill="#ffffff"/>
  <polygon points="144,120 180,135 144,150" fill="#e94560"/>
  <!-- Label -->
  <text x="520" y="72" font-family="Arial, sans-serif" font-size="14" fill="#e94560" text-anchor="middle" font-weight="bold">OFFSIDE LINE</text>
  <!-- Corner accents -->
  <line x1="30" y1="30" x2="80" y2="30" stroke="#4895ef" stroke-width="3"/>
  <line x1="30" y1="30" x2="30" y2="80" stroke="#4895ef" stroke-width="3"/>
  <line x1="770" y1="30" x2="720" y2="30" stroke="#4895ef" stroke-width="3"/>
  <line x1="770" y1="30" x2="770" y2="80" stroke="#4895ef" stroke-width="3"/>
  <!-- Title -->
  <text x="400" y="420" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">What is Offside in Football?</text>
</svg>