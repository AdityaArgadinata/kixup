<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4895ef"/>
      <stop offset="100%" style="stop-color:#4cc9f0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Chart background -->
  <rect x="150" y="60" width="500" height="300" rx="8" fill="#16213e" stroke="#2a2a4a" stroke-width="1"/>
  <!-- Grid lines -->
  <line x1="150" y1="120" x2="650" y2="120" stroke="#2a2a4a" stroke-width="1"/>
  <line x1="150" y1="180" x2="650" y2="180" stroke="#2a2a4a" stroke-width="1"/>
  <line x1="150" y1="240" x2="650" y2="240" stroke="#2a2a4a" stroke-width="1"/>
  <line x1="150" y1="300" x2="650" y2="300" stroke="#2a2a4a" stroke-width="1"/>
  <!-- xG bar -->
  <rect x="200" y="200" width="120" height="40" rx="4" fill="url(#bar)"/>
  <text x="260" y="225" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">xG: 0.73</text>
  <!-- Actual goals bar -->
  <rect x="200" y="260" width="180" height="40" rx="4" fill="url(#bar2)"/>
  <text x="290" y="285" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Goals: 1.20</text>
  <!-- Labels -->
  <text x="170" y="225" font-family="Arial, sans-serif" font-size="12" fill="#a0a0c0" text-anchor="end">Expected</text>
  <text x="170" y="285" font-family="Arial, sans-serif" font-size="12" fill="#a0a0c0" text-anchor="end">Actual</text>
  <!-- Scatter dots (shot map) -->
  <circle cx="480" cy="150" r="6" fill="#e94560" opacity="0.8"/>
  <circle cx="500" cy="180" r="4" fill="#4895ef" opacity="0.7"/>
  <circle cx="520" cy="140" r="5" fill="#e94560" opacity="0.8"/>
  <circle cx="460" cy="200" r="3" fill="#4895ef" opacity="0.6"/>
  <circle cx="540" cy="170" r="7" fill="#e94560" opacity="0.9"/>
  <circle cx="490" cy="220" r="4" fill="#4895ef" opacity="0.7"/>
  <circle cx="510" cy="160" r="5" fill="#e94560" opacity="0.8"/>
  <!-- xG label -->
  <text x="400" y="95" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">xG</text>
  <text x="400" y="115" font-family="Arial, sans-serif" font-size="12" fill="#a0a0c0" text-anchor="middle">Expected Goals</text>
  <!-- Corner accents -->
  <line x1="30" y1="30" x2="80" y2="30" stroke="#e94560" stroke-width="3"/>
  <line x1="30" y1="30" x2="30" y2="80" stroke="#e94560" stroke-width="3"/>
  <line x1="770" y1="30" x2="720" y2="30" stroke="#e94560" stroke-width="3"/>
  <line x1="770" y1="30" x2="770" y2="80" stroke="#e94560" stroke-width="3"/>
  <!-- Title -->
  <text x="400" y="420" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">What is xG in Football?</text>
</svg>