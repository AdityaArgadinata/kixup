<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="trophy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Trophy 1 (League) -->
  <g transform="translate(200, 120)">
    <rect x="25" y="120" width="50" height="20" rx="4" fill="#b8860b"/>
    <rect x="35" y="100" width="30" height="25" fill="#b8860b"/>
    <path d="M50 10 Q20 10 15 50 Q15 80 50 90 Q85 80 85 50 Q80 10 50 10Z" fill="url(#trophy)" stroke="#ffd700" stroke-width="1"/>
    <text x="50" y="160" font-family="Arial, sans-serif" font-size="12" fill="#a0a0c0" text-anchor="middle">League</text>
  </g>
  <!-- Trophy 2 (Cup) -->
  <g transform="translate(370, 120)">
    <rect x="25" y="120" width="50" height="20" rx="4" fill="#b8860b"/>
    <rect x="35" y="100" width="30" height="25" fill="#b8860b"/>
    <path d="M50 10 Q20 10 15 50 Q15 80 50 90 Q85 80 85 50 Q80 10 50 10Z" fill="url(#trophy)" stroke="#ffd700" stroke-width="1"/>
    <text x="50" y="160" font-family="Arial, sans-serif" font-size="12" fill="#a0a0c0" text-anchor="middle">Cup</text>
  </g>
  <!-- Trophy 3 (Champions League) -->
  <g transform="translate(540, 120)">
    <rect x="25" y="120" width="50" height="20" rx="4" fill="#b8860b"/>
    <rect x="35" y="100" width="30" height="25" fill="#b8860b"/>
    <path d="M50 10 Q20 10 15 50 Q15 80 50 90 Q85 80 85 50 Q80 10 50 10Z" fill="url(#trophy)" stroke="#ffd700" stroke-width="1"/>
    <text x="50" y="160" font-family="Arial, sans-serif" font-size="12" fill="#a0a0c0" text-anchor="middle">UCL</text>
  </g>
  <!-- Connecting lines -->
  <line x1="290" y1="200" x2="370" y2="200" stroke="#ffd700" stroke-width="2" opacity="0.5"/>
  <line x1="460" y1="200" x2="540" y2="200" stroke="#ffd700" stroke-width="2" opacity="0.5"/>
  <!-- Plus signs -->
  <text x="330" y="205" font-family="Arial, sans-serif" font-size="20" fill="#ffd700" text-anchor="middle">+</text>
  <text x="500" y="205" font-family="Arial, sans-serif" font-size="20" fill="#ffd700" text-anchor="middle">+</text>
  <!-- Equals -->
  <text x="400" y="270" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffd700" text-anchor="middle">= THE TREBLE</text>
  <!-- Corner accents -->
  <line x1="30" y1="30" x2="80" y2="30" stroke="#ffd700" stroke-width="3"/>
  <line x1="30" y1="30" x2="30" y2="80" stroke="#ffd700" stroke-width="3"/>
  <line x1="770" y1="30" x2="720" y2="30" stroke="#ffd700" stroke-width="3"/>
  <line x1="770" y1="30" x2="770" y2="80" stroke="#ffd700" stroke-width="3"/>
  <!-- Title -->
  <text x="400" y="420" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">What is a Treble in Football?</text>
</svg>